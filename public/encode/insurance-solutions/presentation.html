<div class="counter" id="counter">01 / 12</div>

<script>
var TOTAL = 12;
var cur = 0;

function go(dir) {
  cur = Math.max(0, Math.min(TOTAL - 1, cur + dir));
  document.getElementById('track').style.transform = 'translateX(-' + (cur * 1280) + 'px)';
  document.getElementById('counter').textContent = String(cur + 1).padStart(2,'0') + ' / ' + String(TOTAL).padStart(2,'0');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
});

(function scaleStage() {
  var stage = document.querySelector('.stage');
  var track = document.getElementById('track');
  function doScale() {
    var s = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
    track.style.transformOrigin = '0 0';
    stage.style.transform = 'none';
    var cells = document.querySelectorAll('.cell');
    cells.forEach(function(c){ c.style.transform = 'none'; });
    track.style.transform = 'translateX(-' + (cur * 1280) + 'px) scale(' + s + ')';
    track.style.transformOrigin = '0 0';
    var trackW = 1280 * s;
    var trackH = 720 * s;
    track.style.marginLeft = ((window.innerWidth - trackW) / 2) + 'px';
    track.style.marginTop = ((window.innerHeight - trackH) / 2) + 'px';
  }
  window.addEventListener('resize', doScale);
  doScale();

  // Override go() to maintain scale
  window._goOrig = go;
  window.go = function(dir) {
    cur = Math.max(0, Math.min(TOTAL - 1, cur + dir));
    track.style.transformOrigin = '0 0';
    track.style.transition = 'transform 0.55s cubic-bezier(0.77,0,0.175,1)';
    var s = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
    track.style.transform = 'translateX(-' + (cur * 1280) + 'px) scale(' + s + ')';
    document.getElementById('counter').textContent = String(cur + 1).padStart(2,'0') + ' / ' + String(TOTAL).padStart(2,'0');
  };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') window.go(1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') window.go(-1);
  });
})();
</script>
