<!DOCTYPE html>

<script>
/* Access gate — validated against ElevateNow backend */
(function(){
  var PAPER='encode';
  var API='https://en-workspace-backend.enowclear360.com/api/access/validate';
  var KEY='el_email_'+PAPER;
  function unlock(){document.documentElement.classList.add('el-unlocked');}
  localStorage.removeItem('el_'+PAPER);var stored=localStorage.getItem(KEY);
  if(stored){
    fetch(API+'?email='+encodeURIComponent(stored)+'&artifact='+encodeURIComponent(PAPER))
      .then(function(r){return r.json();})
      .then(function(d){if(d.allowed){unlock();}else{localStorage.removeItem(KEY);}})
      .catch(function(){});
  }
  window._elSubmit=function(e){
    e.preventDefault();
    var inp=document.getElementById('el-inp');
    var msg=document.getElementById('el-msg');
    var btn=document.getElementById('el-btn');
    var email=(inp.value||'').trim();
    if(!email)return;
    btn.textContent='Verifying…';btn.disabled=true;
    fetch(API+'?email='+encodeURIComponent(email)+'&artifact='+encodeURIComponent(PAPER))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.allowed){localStorage.setItem(KEY,email);unlock();}
        else{msg.textContent='Access not found for this email. Contact gps@elevatenow.tech.';btn.textContent='Unlock';btn.disabled=false;}
      })
      .catch(function(){msg.textContent='Unable to reach verification server. Try again.';btn.textContent='Unlock';btn.disabled=false;});
  };
})();
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

nav { position: relative; z-index: 200; height: 60px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-s); box-shadow: 0 1px 24px rgba(13,21,52,0.09); }
.nav-brand { display:flex; align-items:center; gap:8px; text-decoration:none; }
.nav-links { display:flex; align-items:center; gap:4px; list-style:none; }
.nav-links a { color:var(--ink2); text-decoration:none; font-size:13.5px; font-weight:500; padding:7px 13px; border-radius:6px; transition:background .15s, color .15s; }
.nav-links a:hover { background:var(--bg); color:var(--ink); }
.nav-links a.active { color:var(--blue); background:var(--blue-bg); font-weight:600; }
.nav-cta { background:var(--blue)!important; color:#fff!important; font-weight:600!important; }
.nav-cta:hover { opacity:.88!important; }
.nav-item { position:relative; }
.nav-item > a { display:flex; align-items:center; gap:4px; }
.nav-item > a::after { content:''; display:inline-block; width:7px; height:4.5px; flex-shrink:0; background:currentColor; clip-path:polygon(0 0,100% 0,50% 100%); opacity:.40; transition:transform .18s, opacity .18s; }
.nav-item.open > a::after { opacity:.75; transform:rotate(180deg); }
.nav-item::after { content:''; position:absolute; top:100%; left:-20px; right:-20px; height:16px; display:none; }
.nav-item.open::after { display:block; }
.nav-drop { position:absolute; top:calc(100% + 8px); left:50%; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:var(--shadow-m); min-width:260px; padding:6px; z-index:300; opacity:0; pointer-events:none; transform:translateX(-50%) translateY(-6px); transition:opacity .16s var(--ease), transform .16s var(--ease); }
.nav-item.open .nav-drop { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
.nav-drop a { display:block; padding:8px 12px; font-size:13px; font-weight:500; color:var(--ink2); border-radius:7px; text-decoration:none; white-space:nowrap; transition:background .12s, color .12s; }
.nav-drop a:hover { background:var(--blue-bg); color:var(--blue); }
.nav-drop a.active { background:var(--blue-bg); color:var(--blue); font-weight:600; }
.nav-ham { display:none; flex-direction:column; justify-content:center; gap:5px; background:none; border:none; cursor:pointer; padding:8px 4px; margin-left:8px; flex-shrink:0; }
.nav-ham span { display:block; width:22px; height:2px; border-radius:2px; background:var(--ink); transition:transform .22s var(--ease), opacity .18s; }
@media (max-width:860px) { nav { padding:0 20px; } .nav-links { display:none; } .nav-ham { display:flex; } }

/* DEMOBOARD FRAME */
.demo-frame { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; background: #0a0a14; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.demo-frame iframe { width: 1280px; height: 720px; border: none; display: block; flex-shrink: 0; transform-origin: center center; }

.el-unlocked #el-protected { display: contents; }
#el-gate { display:flex; position:fixed; inset:0; z-index:9999; background:#0a0a14; align-items:center; justify-content:center; }
.el-unlocked #el-gate { display:none; }
.el-gate-box { background:#fff; border-radius:12px; padding:48px 40px; max-width:420px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.5); }

.el-gate-box h2 { font-family:Georgia,serif; font-size:20px; font-weight:700; color:#0D1534; margin-bottom:10px; }

<script>
(function() {
  const CLOSE_DELAY = 220;
  document.querySelectorAll('.nav-item').forEach(item => {
    let closeTimer = null;
    const open  = () => { clearTimeout(closeTimer); item.classList.add('open'); };
    const close = () => { closeTimer = setTimeout(() => item.classList.remove('open'), CLOSE_DELAY); };
    item.addEventListener('mouseenter', open);
    item.addEventListener('mouseleave', close);
    const panel = item.querySelector('.nav-drop');
    if (panel) { panel.addEventListener('mouseenter', open); panel.addEventListener('mouseleave', close); }
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('.nav-item')) document.querySelectorAll('.nav-item.open').forEach(i => i.classList.remove('open'));
  });
})();

function scaleFrame() {
  const iframe = document.querySelector('.demo-frame iframe');
  if (!iframe) return;
  const s = Math.min(window.innerWidth / 1280, (window.innerHeight - 60) / 720);
  iframe.style.transform = 'scale(' + s + ')';
}
window.addEventListener('load', scaleFrame);
window.addEventListener('resize', scaleFrame);
scaleFrame();
</script>
