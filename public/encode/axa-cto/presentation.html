<script>
  const TOTAL=10, iframes=document.querySelectorAll('.cell iframe');
  let cur=0;
  const track=document.getElementById('track'), prev=document.getElementById('prev'), next=document.getElementById('next'), ctr=document.getElementById('ctr');
  function scaleSlides(){ const s=Math.min(window.innerWidth/1280,window.innerHeight/720); iframes.forEach(f=>f.style.transform='scale('+s+')'); }
  function update(){ track.style.transform='translateX(-'+(cur*100)+'vw)'; prev.classList.toggle('hidden',cur===0); next.classList.toggle('hidden',cur===TOTAL-1); ctr.textContent=String(cur+1).padStart(2,'0')+'  /  '+String(TOTAL).padStart(2,'0'); }
  function go(d){ const n=cur+d; if(n<0||n>=TOTAL)return; cur=n; update(); }
  function goTo(idx){ if(idx<0||idx>=TOTAL)return; cur=idx; update(); }
  document.addEventListener('keydown',e=>{ if(['ArrowRight','ArrowDown',' '].includes(e.key)){ e.preventDefault();go(1); } if(['ArrowLeft','ArrowUp'].includes(e.key)){ e.preventDefault();go(-1); } });
  document.getElementById('stage').addEventListener('click',e=>{ if(!e.target.closest('.nav'))go(1); });
  window.addEventListener('resize',scaleSlides);
  scaleSlides(); update();
</script>
