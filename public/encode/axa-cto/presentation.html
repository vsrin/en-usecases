<script>
  const TOTAL=7, iframes=document.querySelectorAll('.cell iframe');
  let cur=0;
  function scaleAll(){ const vw=window.innerWidth, vh=window.innerHeight, s=Math.min(vw/1280,vh/720); iframes.forEach(f=>{ f.style.transform='scale('+s+')'; }); }
  function update(){ track.style.transform='translateX(-'+(cur*100)+'vw)'; prev.classList.toggle('hidden',cur===0); next.classList.toggle('hidden',cur===TOTAL-1); ctr.textContent=String(cur+1).padStart(2,'0')+'  /  '+String(TOTAL).padStart(2,'0'); }
  function go(d){ const n=cur+d; if(n<0||n>=TOTAL)return; cur=n; update(); }
  function goTo(idx){ if(idx<0||idx>=TOTAL)return; cur=idx; update(); }
  document.getElementById('prev').onclick=()=>go(-1);
  document.getElementById('next').onclick=()=>go(1);
  document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1); if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1); });
  window.addEventListener('resize',scaleAll);
  scaleAll(); update();
  var track=document.getElementById('track'), prev=document.getElementById('prev'), next=document.getElementById('next'), ctr=document.getElementById('ctr');
