<div class="counter" id="counter">01 / 03</div>

<script>
const TOTAL = 3;
let current = 0;
const track = document.getElementById('track');
const navL = document.getElementById('navLeft');
const navR = document.getElementById('navRight');
const counter = document.getElementById('counter');

function scaleFrames() {
  const s = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
  document.querySelectorAll('.cell iframe').forEach(f => {
    f.style.transform = 'scale(' + s + ')';
  });
}

function goTo(n) {
  current = Math.max(0, Math.min(TOTAL - 1, n));
  track.style.transform = 'translateX(-' + (current * 100) + 'vw)';
  navL.classList.toggle('hidden', current === 0);
  navR.classList.toggle('hidden', current === TOTAL - 1);
  counter.textContent = String(current + 1).padStart(2, '0') + ' / ' + String(TOTAL).padStart(2, '0');
}

navL.addEventListener('click', () => goTo(current - 1));
navR.addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
});

// Click anywhere (not on nav) to advance
document.getElementById('stage').addEventListener('click', e => {
  if (!e.target.closest('.nav')) goTo(current + 1);
});

window.addEventListener('resize', scaleFrames);
scaleFrames();
goTo(0);
</script>
