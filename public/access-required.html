<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Required — ElevateNow Insights</title>
<link rel="icon" type="image/png" href="/EN.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0D1534;
  color: #fff;
  -webkit-font-smoothing: antialiased;
}
body { display: flex; flex-direction: column; min-height: 100vh; }

body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 55% 50% at 75% 35%, rgba(33,69,234,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 45% at 15% 75%, rgba(8,145,178,0.08) 0%, transparent 60%);
}
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .025;
  background-image: radial-gradient(circle, rgba(255,255,255,0.9) 1px, transparent 1px);
  background-size: 32px 32px;
}

.top-bar {
  position: relative; z-index: 10;
  display: flex; align-items: center;
  padding: 0 48px; height: 60px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  background: rgba(13,21,52,0.6); backdrop-filter: blur(12px);
}
.brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.brand-name { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
.brand-tag {
  font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: #5B7FF8; background: rgba(33,69,234,0.18); padding: 3px 8px; border-radius: 4px;
}

main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1; padding: 48px 24px;
}
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 56px 48px;
  max-width: 480px; width: 100%;
  text-align: center;
  backdrop-filter: blur(20px);
}

.lock-icon {
  width: 56px; height: 56px; margin: 0 auto 28px;
  background: rgba(33,69,234,0.15);
  border: 1px solid rgba(33,69,234,0.3);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.lock-icon svg { width: 26px; height: 26px; color: #5B7FF8; }

h1 {
  font-size: 24px; font-weight: 800; color: #fff;
  letter-spacing: -.02em; line-height: 1.2; margin-bottom: 12px;
}
.deck {
  font-size: 14px; color: rgba(255,255,255,0.50);
  line-height: 1.72; margin-bottom: 32px;
}

.divider { height: 1px; background: rgba(255,255,255,0.08); margin-bottom: 28px; }

/* Token form */
.form-label {
  display: block; text-align: left;
  font-size: 11.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
  color: rgba(255,255,255,0.40); margin-bottom: 10px;
}
.input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.token-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.14);
  border-radius: 8px;
  padding: 12px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 500;
  color: #fff;
  outline: none;
  transition: border-color .18s;
  letter-spacing: .04em;
}
.token-input::placeholder { color: rgba(255,255,255,0.22); }
.token-input:focus { border-color: rgba(33,69,234,0.70); }
.token-input.error { border-color: rgba(239,68,68,0.60); }

.btn-unlock {
  background: #2145EA; color: #fff;
  border: none; border-radius: 8px;
  padding: 12px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 13.5px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: background .2s;
  flex-shrink: 0;
}
.btn-unlock:hover { background: #1a35c8; }
.btn-unlock:disabled { opacity: .5; cursor: not-allowed; }

.error-msg {
  display: none; text-align: left;
  font-size: 12.5px; color: #F87171;
  margin-bottom: 16px;
}
.error-msg.show { display: block; }

.divider-2 { height: 1px; background: rgba(255,255,255,0.06); margin: 24px 0; }

.request-link {
  font-size: 12.5px; color: rgba(255,255,255,0.35);
  text-decoration: none; transition: color .18s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.request-link:hover { color: rgba(255,255,255,0.65); }

.back-link {
  display: block; margin-top: 14px;
  font-size: 12px; color: rgba(255,255,255,0.22);
  text-decoration: none; transition: color .18s;
}
.back-link:hover { color: rgba(255,255,255,0.45); }

footer {
  position: relative; z-index: 1;
  text-align: center; padding: 20px;
  font-size: 12px; color: rgba(255,255,255,0.18);
}

@media (max-width: 560px) {
  .top-bar { padding: 0 20px; }
  .card { padding: 40px 24px; }
  .input-row { flex-direction: column; }
  .btn-unlock { width: 100%; padding: 13px; }
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="https://insights.elevatenow.tech" class="brand">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="110 120 210 200" fill="rgba(255,255,255,0.65)" width="22" height="22">
      <rect x="116.9" y="156.8" width="57.9" height="57.9"/>
      <rect x="174.8" y="156.8" width="57.9" height="57.9"/>
      <rect x="116.9" y="255.7" width="57.9" height="57.9"/>
      <rect x="215.8" y="197.8" width="57.9" height="57.9"/>
      <rect x="244.7" y="127.8" width="57.9" height="57.9" transform="translate(-30.7 239.5) rotate(-45)"/>
      <rect x="215.8" y="255.7" width="57.9" height="57.9"/>
    </svg>
    <span class="brand-name">ElevateNow</span>
    <span class="brand-tag">Insights</span>
  </a>
</div>

<main>
  <div class="card">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h1>Access Required</h1>
    <p class="deck">ElevateNow Insights is shared selectively. Enter your access token to continue.</p>

    <div class="divider"></div>

    <label class="form-label">Access token</label>
    <div class="error-msg" id="errorMsg">Incorrect token. Please check and try again.</div>
    <div class="input-row">
      <input
        type="password"
        class="token-input"
        id="tokenInput"
        placeholder="Enter your token"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn-unlock" id="unlockBtn" onclick="unlock()">Unlock</button>
    </div>

    <div class="divider-2"></div>

    <a href="mailto:gps@elevatenow.tech?subject=Insights%20Access%20Request" class="request-link">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      Don't have a token? Request access
    </a>
    <a href="https://elevatenow.tech" class="back-link">← Back to elevatenow.tech</a>
  </div>
</main>

<footer>© 2026 ElevateNow · insights.elevatenow.tech</footer>

<script>
  const input = document.getElementById('tokenInput');
  const errorMsg = document.getElementById('errorMsg');

  // Support Enter key
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') unlock();
  });

  // Clear error state on new input
  input.addEventListener('input', () => {
    input.classList.remove('error');
    errorMsg.classList.remove('show');
  });

  function unlock() {
    const token = input.value.trim();
    if (!token) { input.focus(); return; }

    // Redirect to home with token in URL — middleware will validate,
    // set the cookie, and redirect back clean if valid.
    // If invalid, middleware sends them back here; we detect the redirect loop
    // via a `?err=1` param appended below.
    const destination = '/?token=' + encodeURIComponent(token);
    window.location.href = destination;
  }

  // Show error if redirected back with ?err=1
  const params = new URLSearchParams(location.search);
  if (params.get('err') === '1') {
    input.classList.add('error');
    errorMsg.classList.add('show');
    input.focus();
  }
</script>

</body>
</html>
