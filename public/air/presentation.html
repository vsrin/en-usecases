  const total=7; let cur=0;
  function go(i){cur=Math.max(0,Math.min(total-1,i));track.style.transform=`translateX(${-cur*100}vw)`;navL.classList.toggle('hidden',cur===0);navR.classList.toggle('hidden',cur===total-1);ctr.textContent=(cur+1)+' / '+total;}
  navL.addEventListener('click',()=>go(cur-1));navR.addEventListener('click',()=>go(cur+1));
  document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')go(cur+1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(cur-1);});
  go(0);
